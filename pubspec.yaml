name: djembe_bank_mobile
description: Application mobile Djembé Bank
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Réseau et API
  dio: ^5.4.0

  # Sérialisation
  json_annotation: ^4.9.0
  built_value: ^8.9.0
  built_collection: ^5.1.1

  # Sécurité
  flutter_secure_storage: ^9.0.0

  # Injection de dépendances
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Gestion d'état
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  one_of: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Génération de code
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  built_value_generator: ^8.9.0

flutter:
  uses-material-design: true